<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清和居</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 2.5rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .card:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .card-desc {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>清和居</h1>
        <p class="subtitle">传统文化 · 数字体验</p>
        <div class="links">
            <a class="card" href="/ancient-test/">
                <div class="card-title">🏯 古代身份测试</div>
                <div class="card-desc">穿越时空，测测你在古代的身份是什么</div>
            </a>
            <a class="card" href="/wuxing/">
                <div class="card-title">☯️ 五行介绍</div>
                <div class="card-desc">探索五行之力 · 道家视角解读</div>
            </a>
        </div>
        <div class="footer">清和居 &copy; 2024</div>
    </div>
</body>
</html>
